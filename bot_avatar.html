<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><style>
body{margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#1a1a2e}
.avatar{width:512px;height:512px;border-radius:50%;background:linear-gradient(135deg,#e94560,#0f3460);display:flex;flex-direction:column;justify-content:center;align-items:center;font-family:Arial,sans-serif;position:relative;overflow:hidden}
.avatar::before{content:"";position:absolute;width:200%;height:200%;background:radial-gradient(circle,rgba(255,255,255,.05) 0%,transparent 70%);top:-50%;left:-50%}
.icon{font-size:140px;margin-bottom:10px;line-height:1}
.title{color:#fff;font-size:48px;font-weight:900;letter-spacing:2px;text-shadow:0 2px 10px rgba(0,0,0,.3)}
.sub{color:rgba(255,255,255,.8);font-size:20px;margin-top:8px;letter-spacing:4px}
.dots{position:absolute;top:20px;right:30px;font-size:24px;color:rgba(255,255,255,.15)}
.dots2{position:absolute;bottom:30px;left:25px;font-size:18px;color:rgba(255,255,255,.1)}
</style></head>
<body>
<div class="avatar">
<div class="dots">&#9679; &#9679; &#9679;</div>
<div class="dots2">&#9679; &#9679; &#9679; &#9679;</div>
<div class="icon">🎮</div>
<div class="title">GAMES</div>
<div class="title" style="font-size:28px;margin-top:-5px">游戏大厅</div>
<div class="sub">PLAY WITH FRIENDS</div>
</div>
</body>
</html>
