<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🎨 Draw & Guess</title><script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#eee;font-family:sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column}
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#16213e;min-height:44px}
.top-bar .word{font-size:18px;font-weight:700;color:#e94560}
.top-bar .timer{font-size:16px;color:#f1c40f}
.top-bar .hint{font-size:14px;color:#667}
canvas{flex:1;touch-action:none;background:#fff;cursor:crosshair;display:block}
.toolbar{display:flex;flex-wrap:wrap;gap:4px;padding:6px 8px;background:#16213e;justify-content:center;align-items:center}
.colors{display:flex;gap:3px;margin-right:8px}
.color-btn{width:24px;height:24px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:border-color .15s}
.color-btn.active{border-color:#fff}
.brush-group{display:flex;gap:4px;margin:0 4px}
.brush-btn{width:32px;height:28px;border:none;border-radius:4px;background:#0f3460;color:#fff;font-size:12px;cursor:pointer}
.brush-btn.active{background:#e94560}
.action-btn{padding:6px 12px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;margin:0 2px}
.undo{background:#2980b9;color:#fff}.clear{background:#c0392b;color:#fff}
.submit-btn{padding:10px 24px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;background:#2ecc71;color:#fff;margin:6px auto;display:block;width:calc(100% - 16px)}
.submit-btn:disabled{opacity:.4;cursor:not-allowed}
.waiting{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:20px;text-align:center}
.waiting .emoji{font-size:48px;margin-bottom:12px}
.waiting .text{font-size:18px;color:#889;line-height:1.6}
</style></head>
<body>
<div id="ui">
  <div class="top-bar">
    <div class="word" id="wordDisplay">🎨 画这个词</div>
    <div class="timer" id="timerDisplay">⏱ 60s</div>
  </div>
  <canvas id="canvas"></canvas>
  <div class="toolbar">
    <div class="colors" id="colorPalette"></div>
    <div class="brush-group" id="brushGroup"></div>
    <button class="action-btn undo" onclick="undo()">↩</button>
    <button class="action-btn clear" onclick="clearCanvas()">🗑</button>
  </div>
  <button class="submit-btn" id="submitBtn" onclick="submitDraw()">✅ 提交画作</button>
</div>
<div class="waiting" id="waiting" style="display:none">
  <div class="emoji">🎨</div>
  <div class="text" id="waitText">等待其他玩家画画...</div>
</div>

<script>
const P = new URLSearchParams(window.location.search);
const GAME_ID = P.get('gameId');
const PID = P.get('pid');
const WORD = P.get('word') || '';
const LANG = P.get('lang') || 'en';
const tg = window.Telegram?.WebApp;
if(tg){tg.expand();tg.ready()}

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let drawing = false, lastX = 0, lastY = 0, color = '#e74c3c', brushSize = 4;
let history = [], historyIdx = -1;
let timer = 60, timerInt = null;

// Colors
const COLORS = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db','#9b59b6','#34495e','#1abc9c','#fff','#000'];
const SIZES = [3, 6, 10];

function resizeCanvas(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight - 120;
  redrawHistory();
}
window.addEventListener('resize', resizeCanvas);

// Color palette
const pal = document.getElementById('colorPalette');
COLORS.forEach(c => {
  const btn = document.createElement('button');
  btn.className = 'color-btn' + (c === color ? ' active' : '');
  btn.style.background = c;
  btn.style.borderColor = c === '#fff' ? '#ccc' : c;
  btn.onclick = () => { color = c; document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); };
  pal.appendChild(btn);
});

// Brush sizes
const bg = document.getElementById('brushGroup');
SIZES.forEach((s, i) => {
  const btn = document.createElement('button');
  btn.className = 'brush-btn' + (s === brushSize ? ' active' : '');
  btn.textContent = s + 'px';
  btn.onclick = () => { brushSize = s; document.querySelectorAll('.brush-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); };
  bg.appendChild(btn);
});

// Drawing
function startDraw(e){
  e.preventDefault();
  drawing = true;
  const pos = getPos(e);
  lastX = pos.x; lastY = pos.y;
}
function draw(e){
  e.preventDefault();
  if(!drawing)return;
  const pos = getPos(e);
  ctx.beginPath();
  ctx.moveTo(lastX, lastY);
  ctx.lineTo(pos.x, pos.y);
  ctx.strokeStyle = color;
  ctx.lineWidth = brushSize;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.stroke();
  lastX = pos.x; lastY = pos.y;
}
function stopDraw(e){
  e.preventDefault();
  if(!drawing)return;
  drawing = false;
  history.push(canvas.toDataURL());
  if(history.length > 10) history.shift();
  historyIdx = history.length - 1;
}

function getPos(e){
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  if(e.touches){
    return { x: (e.touches[0].clientX - rect.left) * scaleX, y: (e.touches[0].clientY - rect.top) * scaleY };
  }
  return { x: (e.offsetX) * scaleX, y: (e.offsetY) * scaleY };
}

canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', draw);
canvas.addEventListener('mouseup', stopDraw);
canvas.addEventListener('mouseleave', stopDraw);
canvas.addEventListener('touchstart', startDraw, {passive:false});
canvas.addEventListener('touchmove', draw, {passive:false});
canvas.addEventListener('touchend', stopDraw, {passive:false});

function redrawHistory(){
  if(history.length > 0){
    const img = new Image();
    img.onload = () => { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(img,0,0); };
    img.src = history[historyIdx];
  } else {
    ctx.clearRect(0,0,canvas.width,canvas.height);
  }
}

function undo(){
  if(history.length > 0){
    history.pop();
    historyIdx = history.length - 1;
    redrawHistory();
  }
}

function clearCanvas(){
  history = [];
  historyIdx = -1;
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

// Submit
async function submitDraw(){
  const imgData = canvas.toDataURL('image/png');
  document.getElementById('submitBtn').disabled = true;
  document.getElementById('submitBtn').textContent = '⏳ 提交中...';
  try {
    const r = await fetch('/api/draw/submit', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ gameId: GAME_ID, playerId: PID, image: imgData })
    });
    const d = await r.json();
    if(d.success){
      document.getElementById('ui').style.display = 'none';
      document.getElementById('waiting').style.display = 'flex';
      document.getElementById('waitText').textContent = tg ? (LANG === 'zh' ? '🎨 画作已提交，等待其他人猜...' : '🎨 Drawing submitted, waiting for guesses...') : 'Waiting...';
      if(tg) tg.HapticFeedback?.notificationOccurred?.('success');
      // Close Mini App after 2 seconds
      setTimeout(() => { tg?.close(); }, 2000);
    }
  } catch(e) {
    document.getElementById('submitBtn').disabled = false;
    document.getElementById('submitBtn').textContent = '❌ 提交失败，重试';
  }
}

// Timer
function startTimer(){
  timer = 60;
  document.getElementById('timerDisplay').textContent = '⏱ ' + timer + 's';
  timerInt = setInterval(() => {
    timer--;
    document.getElementById('timerDisplay').textContent = '⏱ ' + timer + 's';
    if(timer <= 0){
      clearInterval(timerInt);
      submitDraw();
    }
    if(timer <= 10) document.getElementById('timerDisplay').style.color = '#e74c3c';
  }, 1000);
}

// Init
resizeCanvas();
if(WORD){
  document.getElementById('wordDisplay').textContent = '🎨 ' + decodeURIComponent(WORD);
} else {
  document.getElementById('wordDisplay').textContent = '🎨 ' + (LANG === 'zh' ? '画这个词' : 'Draw this word');
}
startTimer();
</script>
</body></html>
