<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>⚔️ Duel</title><script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f0f1a;color:#eee;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:10px}
.panel{width:100%;max-width:360px;background:#1a1a30;border-radius:10px;padding:12px 14px;margin-bottom:6px}
.panel-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;font-size:14px}
.panel-hp{font-weight:700;font-size:18px;color:#2ecc71}
.hp-bg{width:100%;height:8px;background:#2a2a4a;border-radius:4px;overflow:hidden}
.hp-fill{will-change:width;height:100%;border-radius:4px;transition:width .3s ease}
.hp-fill.high{background:#2ecc71}.hp-fill.med{background:#f1c40f}.hp-fill.low{background:#e74c3c}
.vs{font-size:20px;font-weight:800;color:#e94560;margin:2px 0;text-align:center}
.actions{width:100%;max-width:360px;display:flex;gap:6px;margin:8px 0}
.actions button{flex:1;padding:12px 4px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;text-align:center;color:#fff}
.actions button:active{transform:scale(.92);transition:transform .08s ease}
.btn-atk{background:#c0392b}.btn-atk.selected{background:#e74c3c;box-shadow:0 0 0 2px #fff}
.btn-def{background:#2980b9}.btn-def.selected{background:#3498db;box-shadow:0 0 0 2px #fff}
.btn-heal{background:#27ae60}.btn-heal.selected{background:#2ecc71;box-shadow:0 0 0 2px #fff}
.actions button:disabled{opacity:.35;cursor:not-allowed;transform:none}
.submit{width:100%;max-width:360px;padding:13px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;background:#e94560;color:#fff;margin-bottom:8px;transition:opacity .15s,transform .12s ease;will-change:transform}
.submit:disabled{opacity:.35;cursor:not-allowed;transform:none}
.status{width:100%;max-width:360px;background:#1a1a30;border-radius:8px;padding:10px 14px;text-align:center;font-size:14px;min-height:40px;display:flex;align-items:center;justify-content:center;margin-bottom:6px}
.waiting{color:#f1c40f}.result{color:#2ecc71}
.turn-info{text-align:center;color:#667;font-size:12px;margin:2px 0}
.loading{text-align:center;padding:50px 0;color:#667}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid #1a1a30;border-top-color:#e94560;border-radius:50%;animation:spin .7s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes ci{from{opacity:0;transform:scale(.92) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}.result-card{animation:ci .35s ease-out;width:100%;max-width:360px;background:linear-gradient(135deg,#1a1a30,#0f0f1a);border-radius:14px;padding:18px 16px;margin:6px 0;border:1px solid #333}
.result-card .r-header{text-align:center;margin-bottom:10px}
.result-card .r-header .r-icon{font-size:36px}
.result-card .r-header .r-title{font-size:20px;font-weight:800;margin-top:2px}
.result-card .r-players{display:flex;justify-content:space-between;align-items:center;margin:10px 0}
.result-card .r-player{text-align:center;flex:1}
.result-card .r-player .r-name{font-size:14px;color:#889;margin-bottom:2px}
.result-card .r-player .r-hp{font-size:24px;font-weight:700}
.r-hp.win{color:#2ecc71}.r-hp.lose{color:#e74c3c}
.result-card .r-vs{font-size:18px;color:#e94560;font-weight:800;padding:0 8px}
.result-card .r-bar{margin:6px 0;display:flex;gap:0;height:6px;border-radius:3px;overflow:hidden}
.result-card .r-bar .rb{height:100%}
.result-card .r-bar .rb.w{background:#2ecc71}.result-card .r-bar .rb.l{background:#e74c3c}
.result-card .r-stats{display:flex;justify-content:space-around;margin-top:8px;font-size:12px;color:#667}
</style></head><body>
<div id="root"><div class="loading"><div class="spinner"></div><div id="ld">Loading...</div></div></div>
<script>
const L=new URLSearchParams(window.location.search).get('lang')||'en',T=window.Telegram?.WebApp
if(T){T.expand();T.ready()}
const _={zh:{ld:'加载决斗...',iv:'无效链接',hp:'HP',at:'⚔️ 攻击',df:'🛡️ 防御',hl:'💚 治疗',cf:'确认',wa:'等待对手...',sb:'已选择，等待...',vi:'🏆 胜利！',de:'💀 败北...',dr:'🤯 平局！',ss:'📸 截图分享',cl:'关闭',rd:'共 N 回合',yr:'第 N 回合 · 你的回合'},
en:{ld:'Loading...',iv:'Invalid link',hp:'HP',at:'⚔️ Attack',df:'🛡️ Defend',hl:'💚 Heal',cf:'Confirm',wa:'Waiting...',sb:'Chose, waiting...',vi:'🏆 Victory!',de:'💀 Defeated...',dr:'🤯 Draw!',ss:'📸 Screenshot',cl:'Close',rd:'N rounds',yr:'Round N · Your turn'}}
function t(k,r){let v=_[L][k]||_[L][k]||k;return v&&r?v.replace('N',r):v||k}
const GI=new URLSearchParams(window.location.search).get('gameId'),P1=new URLSearchParams(window.location.search).get('p1'),PI=P1
if(!GI||!PI)document.getElementById('root').innerHTML='<div class="status" style="color:#e74c3c">❌ '+t('iv')+'</div>'

let st,sa=null,su=false,pi=null
function hc(h){const p=h/8;return p>.5?'high':p>.25?'med':'low'}
function pa(d){return'<div class="panel"><div class="panel-hdr"><span>👤 '+d.me.username+'</span><span>'+t('hp')+' <span class="panel-hp">'+d.me.hp+'</span>/8</span></div><div class="hp-bg"><div class="hp-fill '+hc(d.me.hp)+'" style="width:'+(d.me.hp/8*100)+'%"></div></div></div><div class="vs">⚔️</div><div class="panel" style="opacity:.85"><div class="panel-hdr"><span>👤 '+d.opp.username+'</span><span>'+t('hp')+' <span class="panel-hp">'+d.opp.hp+'</span>/8</span></div><div class="hp-bg"><div class="hp-fill '+hc(d.opp.hp)+'" style="width:'+(d.opp.hp/8*100)+'%"></div></div></div>'}
function ac(){return'<div class="actions"><button class="btn-atk" data-a="attack" onclick="sl(\'attack\')"><div style="font-size:20px">⚔️</div><div>'+t('at')+'</div></button><button class="btn-def" data-a="defend" onclick="sl(\'defend\')"><div style="font-size:20px">🛡️</div><div>'+t('df')+'</div></button><button class="btn-heal" data-a="heal" onclick="sl(\'heal\')"><div style="font-size:20px">💚</div><div>'+t('hl')+'</div></button></div><button class="submit" id="sb" onclick="sm()" disabled>'+t('cf')+'</button>'}
function sl(a){if(su)return;sa=a;document.querySelectorAll('.actions button').forEach(b=>b.classList.toggle('selected',b.dataset.a===a));document.getElementById('sb').disabled=false}
async function sm(){if(!sa||su)return;su=true;document.getElementById('sb').disabled=true;document.querySelectorAll('.actions button').forEach(b=>b.disabled=true)
try{const r=await fetch(window.location.origin+'/api/duel/'+GI+'/action',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pid:PI,action:sa})});const d=await r.json();if(d.error)throw Error(d.error);st=d.game;wt();pl()}catch(e){document.getElementById('sb').disabled=false;document.querySelectorAll('.actions button').forEach(b=>b.disabled=false);su=false}}
function wt(){document.getElementById('root').innerHTML=pa(st)+'<div class="turn-info">'+t('yr',st.turn)+'</div><div class="status waiting"><div class="spinner" style="width:16px;height:16px;border-width:2px;margin-right:8px"></div>'+t('sb')+'</div>'}
function pl(){if(pi)clearInterval(pi);pi=setInterval(pl2,1200)}
async function pl2(){try{const r=await fetch(window.location.origin+'/api/duel/'+GI+'/poll?pid='+PI);const d=await r.json();if(d.error)return
if(d.log&&d.log.length>0||d.status==='finished'){clearInterval(pi);pi=null;sr(d)}}catch(e){}}
function sr(d){su=false;sa=null;fetch(window.location.origin+'/api/duel/'+GI+'?pid='+PI).then(r=>r.json()).then(f=>{st=f;const ml=f.me,ol=f.opp;const mw=f.winner==PI,drw=f.winner==='draw'
if(f.status==='finished'){
const ic=mw?'🏆':drw?'🤯':'💀',tt=mw?t('vi'):drw?t('dr'):t('de'),mh=ml.hp,oh=ol.hp,mc=mw?'win':'lose',oc=mw?'lose':'win',to=mh+oh||1
document.getElementById('root').innerHTML=pa(f)+'<div class="result-card"><div class="r-header"><div class="r-icon">'+ic+'</div><div class="r-title">'+tt+'</div></div><div class="r-players"><div class="r-player"><div class="r-name">👤 '+ml.username+'</div><div class="r-hp '+mc+'">❤️ '+mh+'</div></div><div class="r-vs">VS</div><div class="r-player"><div class="r-name">👤 '+ol.username+'</div><div class="r-hp '+oc+'">❤️ '+oh+'</div></div></div><div class="r-bar"><div class="rb w" style="width:'+(mh/to*100)+'%"></div><div class="rb l" style="width:'+(oh/to*100)+'%"></div></div><div class="r-stats"><span>'+t('rd',f.turn-1)+'</span></div></div><div style="text-align:center;color:#667;font-size:11px;margin-top:4px">'+t('ss')+'</div><button class="submit" onclick="ca()" style="margin-top:8px">'+t('cl')+'</button>'
}else{
const lg=f.log[f.log.length-1]
document.getElementById('root').innerHTML=pa(f)+'<div class="turn-info">'+t('yr',f.turn)+'</div>'+(lg?'<div class="status result">'+lg.log+'</div>':'')+'<div class="turn-info">'+t('yr',f.turn)+'</div>'+ac()
}}).catch(()=>{document.getElementById('root').innerHTML='<div class="status result">'+(d.winner==PI?'🏆 '+t('vi'):d.winner==='draw'?'🤯 '+t('dr'):'💀 '+t('de'))+'</div>'})}
function ca(){T?.close()||window.close()}
async function init(){try{const r=await fetch(window.location.origin+'/api/duel/'+GI+'?pid='+PI);const d=await r.json();if(!d||d.error)throw Error(d.error||'?');st=d
if(d.status==='finished')return sr(d)
if(d.me.action!==null){wt();pl();return}
document.getElementById('root').innerHTML=pa(d)+'<div class="turn-info">'+t('yr',d.turn)+'</div>'+ac()
}catch(e){document.getElementById('root').innerHTML='<div class="status" style="color:#e74c3c">❌ '+e.message+'</div>'}}
document.getElementById('ld').textContent=t('ld');init()
</script></body></html>
